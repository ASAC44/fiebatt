name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  repository-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_layout.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - run: npx playwright install --with-deps chromium
        working-directory: apps/web
      - run: npm run test:e2e
        working-directory: apps/web

  cli-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          cd apps/cli
          pip install -e ".[test]"
          NO_COLOR=1 python -m pytest tests/ -v
        env:
          NO_COLOR: "1"

  api-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -c "
          import ast, pathlib, sys
          errors = []
          for f in pathlib.Path('apps/api/app').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              print('\n'.join(errors))
              sys.exit(1)
          print('all api files parse OK')
          "

  plugin-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Codex plugin package
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("plugins/fiebatt")
          manifest = json.loads((root / ".codex-plugin/plugin.json").read_text())
          marketplace = json.loads(Path(".agents/plugins/marketplace.json").read_text())
          assert root.name == manifest["name"] == "fiebatt"
          assert (root / ".mcp.json").is_file()
          assert (root / "skills/fiebatt-edit/SKILL.md").read_text().startswith("---\nname: fiebatt-edit\n")
          entry = next(item for item in marketplace["plugins"] if item["name"] == "fiebatt")
          assert entry["source"]["path"] == "./plugins/fiebatt"
          assert entry["policy"]["installation"] == "AVAILABLE"
          print("Codex plugin package is internally consistent")
          PY

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      - run: pip install -r apps/api/requirements.txt
      - run: >-
          PYTHONPATH=apps/api python -m pytest
          apps/api/tests/ai
          apps/api/tests/test_auth.py
          apps/api/tests/test_pipeline.py
          apps/api/tests/test_plugin_api.py
          apps/api/tests/test_production_settings.py
          -q
