name: Railway Deploy

on:
  workflow_dispatch:

concurrency:
  group: railway-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: 0b4d085d-f6da-4f03-a395-3ce56fdf1395
      RAILWAY_ENVIRONMENT: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: railway up apps/backend --path-as-root --service backend --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --ci --message "deploy backend from github"

      - name: Deploy frontend
        run: railway up apps/frontend --path-as-root --service frontend --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_ENVIRONMENT" --ci --message "deploy frontend from github"
