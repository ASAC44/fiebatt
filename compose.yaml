services:
  frontend:
    build:
      context: ./apps/frontend
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://backend:8000}
    ports:
      - "3001:3001"
    depends_on:
      - backend

  backend:
    build:
      context: ./apps/backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://fiebatt:fiebatt@db:5432/fiebatt}
      VISION_WORKER_URL: ${VISION_WORKER_URL:-http://vision-worker:8001}
      USE_AI_STUBS: ${USE_AI_STUBS:-true}
    volumes:
      - storage:/app/storage
    depends_on:
      - db

  vision-worker:
    profiles: ["gpu"]
    build:
      context: ./apps/vision-worker
    ports:
      - "8001:8001"
    volumes:
      - ./apps/vision-worker/checkpoints:/app/checkpoints:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fiebatt
      POSTGRES_PASSWORD: fiebatt
      POSTGRES_DB: fiebatt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  storage:
  pgdata:
